<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Invoice</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 40px 20px;
            color: #1f2937;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
        }
        h1 {
            margin-top: 0;
            color: #345695;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }
        .field {
            display: flex;
            flex-direction: column;
            margin-bottom: 16px;
        }
        .field label {
            font-weight: 600;
            margin-bottom: 6px;
        }
        .field input, .field textarea, .field select {
            border: 1px solid #d1d5db;
            border-radius: 10px;
            padding: 12px;
            font-size: 14px;
        }
        .full {
            grid-column: 1 / -1;
        }
        .btn {
            background: #345695;
            color: white;
            border: none;
            padding: 14px 22px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
        }
        .errors {
            color: #b91c1c;
            font-size: 13px;
            margin-top: 6px;
        }
        @media (max-width: 700px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>Invoice Generator</h1>
        <p>Fill in the invoice details, preview the result, then download the PDF.</p>

        <form method="post">
            {% csrf_token %}

            <div class="grid">
                {% for field in form %}
                    <div class="field {% if field.name in 'billed_to_address from_address note' %}full{% endif %}">
                        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                        {{ field }}
                        {% if field.help_text %}
                            <small>{{ field.help_text }}</small>
                        {% endif %}
                        {% for error in field.errors %}
                            <div class="errors">{{ error }}</div>
                        {% endfor %}
                    </div>
                {% endfor %}
            </div>

            <button type="submit" class="btn">Preview Invoice</button>
        </form>
    </div>
</div>
</body>
</html>
