<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Preview</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 30px 20px;
            color: #1f2937;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-block;
            text-decoration: none;
            background: #345695;
            color: white;
            padding: 12px 18px;
            border-radius: 10px;
            font-weight: 600;
        }
        .btn.secondary {
            background: #6b7280;
        }
        iframe {
            width: 100%;
            height: 80vh;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            margin-top: 20px;
        }
        .meta {
            margin-top: 10px;
            color: #4b5563;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="topbar">
            <div>
                <h1 style="margin: 0;">Invoice Preview</h1>
                <div class="meta">Invoice Number: <strong>{{ invoice_number }}</strong></div>
            </div>

            <div style="display:flex; gap:10px; flex-wrap:wrap;">
                <a href="{% url 'invoice-form' %}" class="btn secondary">Back</a>
                <a href="{% url 'invoice-download' %}" class="btn">Download PDF</a>
            </div>
        </div>

        <iframe src="{{ pdf_data_url }}"></iframe>
    </div>
</div>
</body>
</html>
