{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | CodeX</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --card-bg: #ffffff;
            --text: #1f2937;
            --muted: #4b5563;
            --dark: #3b3b3b;
            --light-wave: #d9d9d9;
            --line: #e5e7eb;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .wave {
            position: absolute;
            left: 0;
            width: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .wave-light {
            bottom: 40px;
            height: 220px;
            background: var(--light-wave);
            clip-path: ellipse(75% 65% at 30% 100%);
            opacity: 0.95;
        }

        .wave-dark {
            bottom: -20px;
            height: 220px;
            background: var(--dark);
            clip-path: ellipse(85% 70% at 75% 100%);
        }

        .card {
            position: relative;
            z-index: 2;
            max-width: 650px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 22px;
            padding: 42px 34px;
            box-shadow: 0 18px 48px rgba(0, 0, 0, 0.08);
            text-align: center;
            border: 1px solid rgba(229, 231, 235, 0.85);
            backdrop-filter: blur(4px);
        }

        .logo-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 18px;
        }

        .logo {
            max-width: 220px;
            width: 100%;
            height: auto;
            object-fit: contain;
        }

        .divider {
            width: 90px;
            height: 4px;
            background: #111827;
            border-radius: 999px;
            margin: 0 auto 22px;
            opacity: 0.9;
        }

        .title {
            font-size: 30px;
            font-weight: 700;
            margin: 0 0 12px;
            color: #111827;
            letter-spacing: -0.02em;
        }

        .text {
            font-size: 16px;
            line-height: 1.75;
            color: var(--muted);
            margin: 0 0 30px;
        }

        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            border: none;
            border-radius: 12px;
            padding: 14px 20px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            background: #111827;
            color: #ffffff;
        }

        .btn-secondary {
            background: #e5e7eb;
            color: #111827;
        }

        @media (max-width: 640px) {
            .card {
                padding: 34px 22px;
                border-radius: 18px;
            }

            .logo {
                max-width: 180px;
            }

            .title {
                font-size: 26px;
            }

            .text {
                font-size: 15px;
            }

            .wave-light,
            .wave-dark {
                height: 170px;
            }
        }
    </style>
</head>
<body>
    <div class="wave wave-light"></div>
    <div class="wave wave-dark"></div>

    <div class="card">
        <div class="logo-wrap">
            <img src="{% static 'images/logo-watermark.jpg' %}" alt="CodeX Logo" class="logo">
        </div>

        <div class="divider"></div>

        <h1 class="title">Page not found</h1>
        <p class="text">
            The page you’re trying to reach does not exist, may have moved, or wandered off into administrative fog.
        </p>

        <div class="actions">
            <a href="/invoice/" class="btn btn-primary">Go to Invoice Page</a>
        </div>
    </div>
</body>
</html>
